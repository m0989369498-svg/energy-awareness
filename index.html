<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>意識能量覺察 · Energy Awareness</title>
<style>
  :root{
    --bg:#FAFAFA;
    --surface:#FFFFFF;
    --primary:#78866B;
    --primary-soft:#EEF1EA;
    --secondary:#E5E7EB;
    --text:#374151;
    --muted:#9CA3AF;
    --accent-blue:#7B86B8;
    --shadow:0 8px 30px rgba(0,0,0,0.04);
    --shadow-lg:0 12px 40px rgba(0,0,0,0.07);
    --radius:1.5rem;
    --ease:all .5s ease-in-out;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","PingFang SC","Hiragino Sans","Yu Gothic","Microsoft JhengHei","Microsoft YaHei","Malgun Gothic","Noto Sans TC","Noto Sans SC","Segoe UI",Roboto,sans-serif;
    font-weight:300;
    line-height:1.8;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #wrap{max-width:30rem;margin:0 auto;padding:1.5rem 1.5rem 4rem;}
  header{
    display:flex;justify-content:space-between;align-items:center;
    padding:.75rem 0 2.5rem;
  }
  .logo{display:flex;align-items:center;gap:.6rem;font-weight:400;letter-spacing:.05em;color:var(--text);}
  .logo-dot{
    width:.9rem;height:.9rem;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #B9C4AC, var(--primary));
    box-shadow:0 0 12px rgba(120,134,107,.45);
  }
  select#lang{
    appearance:none;-webkit-appearance:none;
    border:none;outline:none;cursor:pointer;
    background:var(--surface);color:var(--muted);
    font-family:inherit;font-size:.8rem;font-weight:300;
    padding:.45rem 1.9rem .45rem 1rem;border-radius:9999px;
    box-shadow:var(--shadow);
    background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239CA3AF' stroke-width='1.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right .8rem center;
    transition:var(--ease);
  }
  .fade{animation:fadeIn .5s ease-in-out;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.85;}50%{transform:scale(1.06);opacity:1;}}

  /* ---------- landing ---------- */
  .hero{text-align:center;padding:1.5rem 0 0;}
  .aura{
    width:8.5rem;height:8.5rem;margin:0 auto 2.5rem;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #FFFFFF 0%, #DCE8D5 35%, #B9C4AC 70%, #78866B 100%);
    box-shadow:0 0 60px rgba(120,134,107,.35), var(--shadow-lg);
    animation:breathe 6s ease-in-out infinite;
  }
  h1{font-size:1.7rem;font-weight:500;letter-spacing:.08em;margin-bottom:1rem;}
  .subtitle{color:var(--muted);font-size:.92rem;font-weight:300;margin-bottom:3rem;padding:0 .5rem;}
  .domains{display:flex;gap:1rem;margin-bottom:3rem;}
  .domain-chip{
    flex:1;background:var(--surface);border-radius:var(--radius);
    padding:1.6rem 1rem;box-shadow:var(--shadow);transition:var(--ease);
  }
  .domain-chip .d-icon{font-size:1.5rem;margin-bottom:.6rem;}
  .domain-chip .d-name{font-weight:500;font-size:.95rem;margin-bottom:.25rem;}
  .domain-chip .d-desc{color:var(--muted);font-size:.78rem;}
  .btn{
    display:block;width:100%;border:none;cursor:pointer;
    font-family:inherit;font-size:1rem;font-weight:400;letter-spacing:.12em;
    padding:1.15rem;border-radius:9999px;
    background:var(--primary);color:#fff;
    box-shadow:0 10px 28px rgba(120,134,107,.35);
    transition:var(--ease);
  }
  .btn:hover{filter:brightness(1.06);transform:translateY(-2px);}
  .btn:active{transform:translateY(0);}
  .btn-ghost{
    background:var(--surface);color:var(--text);
    box-shadow:var(--shadow);font-weight:300;
  }
  .meta-note{color:var(--muted);font-size:.78rem;text-align:center;margin-top:1.5rem;}

  /* ---------- quiz ---------- */
  .q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
  .q-domain{
    font-size:.75rem;letter-spacing:.1em;color:var(--primary);
    background:var(--primary-soft);padding:.35rem 1rem;border-radius:9999px;font-weight:400;
  }
  .q-domain.b{color:var(--accent-blue);background:#EDEFF7;}
  .q-count{color:var(--muted);font-size:.8rem;}
  .progress{height:.3rem;background:var(--secondary);border-radius:9999px;overflow:hidden;margin-bottom:2.8rem;}
  .progress > div{height:100%;background:var(--primary);border-radius:9999px;transition:width .5s ease-in-out;}
  .q-text{font-size:1.22rem;font-weight:400;line-height:1.7;margin-bottom:2.2rem;min-height:4.2rem;}
  .opts{display:flex;flex-direction:column;gap:1rem;}
  .opt{
    background:var(--surface);border:none;cursor:pointer;text-align:left;
    font-family:inherit;font-size:.95rem;font-weight:300;color:var(--text);line-height:1.7;
    padding:1.2rem 1.4rem;border-radius:1.25rem;
    box-shadow:var(--shadow);transition:var(--ease);
  }
  .opt:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);background:var(--primary-soft);}
  .q-back{
    margin-top:2.2rem;background:none;border:none;cursor:pointer;
    color:var(--muted);font-family:inherit;font-size:.85rem;font-weight:300;
    transition:var(--ease);
  }
  .q-back:hover{color:var(--text);}

  /* ---------- result ---------- */
  .r-head{text-align:center;margin-bottom:2.5rem;}
  .r-aura{
    width:9.5rem;height:9.5rem;margin:0 auto 1.8rem;border-radius:50%;
    box-shadow:var(--shadow-lg);animation:breathe 6s ease-in-out infinite;
  }
  .r-label{color:var(--muted);font-size:.8rem;letter-spacing:.18em;margin-bottom:.5rem;}
  .r-archetype{font-size:1.55rem;font-weight:500;letter-spacing:.06em;margin-bottom:.4rem;}
  .r-levelname{color:var(--muted);font-size:.9rem;}
  .cards{display:flex;flex-direction:column;gap:1.25rem;margin-bottom:1.25rem;}
  .card{
    background:var(--surface);border-radius:var(--radius);
    padding:1.8rem;box-shadow:var(--shadow);
  }
  .scores{display:flex;gap:1.25rem;}
  .scores .card{flex:1;text-align:center;padding:1.6rem .8rem;}
  .s-title{color:var(--muted);font-size:.76rem;margin-bottom:.6rem;letter-spacing:.04em;}
  .s-value{font-size:2rem;font-weight:500;line-height:1.2;}
  .s-level{font-size:.85rem;margin-top:.35rem;font-weight:400;}
  .s-a .s-value,.s-a .s-level{color:var(--primary);}
  .s-b .s-value,.s-b .s-level{color:var(--accent-blue);}
  .card h3{font-size:.95rem;font-weight:500;margin-bottom:.8rem;letter-spacing:.04em;}
  .card p{font-size:.88rem;color:var(--text);font-weight:300;}
  .gap-warn{border-left:3px solid #C9A86A;}
  .gap-ok{border-left:3px solid var(--primary);}
  .chart-wrap{overflow:hidden;}
  .legend{display:flex;gap:1.4rem;margin-top:.8rem;font-size:.75rem;color:var(--muted);}
  .legend span::before{content:"";display:inline-block;width:.85rem;height:.2rem;border-radius:2px;margin-right:.4rem;vertical-align:middle;}
  .legend .la::before{background:var(--primary);}
  .legend .lb::before{background:var(--accent-blue);}
  .r-actions{display:flex;flex-direction:column;gap:1rem;margin-top:2.2rem;}

  /* ---------- share modal ---------- */
  #modal{
    position:fixed;inset:0;display:none;z-index:50;
    background:rgba(55,65,81,.45);backdrop-filter:blur(6px);
    align-items:center;justify-content:center;padding:1.5rem;
  }
  #modal.open{display:flex;}
  .modal-box{
    background:var(--surface);border-radius:var(--radius);
    padding:1.5rem;max-width:21rem;width:100%;
    box-shadow:var(--shadow-lg);text-align:center;
    max-height:92vh;overflow-y:auto;
  }
  .modal-box img{width:100%;border-radius:1rem;box-shadow:var(--shadow);}
  .modal-hint{color:var(--muted);font-size:.8rem;margin:.9rem 0 1.1rem;}
  .modal-actions{display:flex;gap:.8rem;}
  .modal-actions .btn{padding:.85rem;font-size:.88rem;}
  footer{
    text-align:center;color:var(--muted);font-size:.72rem;font-weight:300;
    margin-top:3.5rem;letter-spacing:.05em;
  }
</style>
</head>

    {t:"스트레스가 극심한 몇 주 동안 나의 상태는?",o:["무감각하게 버티고 퇴근 후엔 눕기만 한다","예민해져서 주변에 화풀이하게 된다","의식적으로 휴식을 넣어 페이스를 조절한다","바쁜 와중에도 성취감과 재미를 느낀다"]},
    {t:"내일 경영진 앞에서 중요한 발표가 있다면 오늘 밤은?",o:["망치는 장면이 떠올라 잠이 안 온다","'아무렴 어때, 끝나기만 하면 되지'라고 생각한다","조금 긴장되지만 준비를 믿는다","설렌다, 성과를 보여줄 생각에 기대된다"]},
  ],
},
};

/* ================= state ================= */
let locale = detectLocale();
let state = { screen:"landing", qIndex:0, answers:[] };
const $ = (id)=>document.getElementById(id);
const T = ()=>I18N[locale];

function detectLocale(){
  const saved = localStorage.getItem("hawkins_lang");
  if(saved && I18N[saved]) return saved;
  const nav = (navigator.language||"en").toLowerCase();
  if(nav.startsWith("zh")){
    if(nav.includes("tw")||nav.includes("hant")||nav.includes("hk")||nav.includes("mo")) return "zh-TW";
    return "zh-CN";
  }
  if(nav.startsWith("ja")) return "ja";
  if(nav.startsWith("ko")) return "ko";
  return "en";
}

function levelOf(score){
  for(const l of LEVELS){ if(score>=l.v) return l; }
  return LEVELS[LEVELS.length-1];
}
function archetypeOf(score){
  for(const a of ARCHETYPES){ if(score>=a.min) return a; }
  return ARCHETYPES[ARCHETYPES.length-1];
}
function avg(arr){ return Math.round(arr.reduce((s,x)=>s+x,0)/arr.length); }

function loadHistory(){
  try{ return JSON.parse(localStorage.getItem("hawkins_history")||"[]"); }catch(e){ return []; }
}
function saveHistory(a,b){
  const h = loadHistory();
  h.push({t:Date.now(),a,b});
  while(h.length>24) h.shift();
  localStorage.setItem("hawkins_history",JSON.stringify(h));
}

/* ================= rendering ================= */
function setChrome(){
  document.documentElement.lang = locale;
  document.title = T().ui.appTitle + " · Energy Awareness";
  $("logoText").textContent = T().ui.logo;
  $("foot").textContent = T().ui.foot;
  $("lang").value = locale;
  $("btnClose").textContent = T().ui.closeBtn;
  $("btnShare").textContent = T().ui.shareBtn;
  $("modalHint").textContent = T().ui.modalHint;
}

function render(){
  setChrome();
  const m = $("main");
  if(state.screen==="landing") m.innerHTML = viewLanding();
  else if(state.screen==="quiz") m.innerHTML = viewQuiz();
  else m.innerHTML = viewResult();
  bindEvents();
}

function viewLanding(){
  const u = T().ui;
  return `<div class="fade">
    <div class="hero">
      <div class="aura"></div>
      <h1>${u.appTitle}</h1>
      <p class="subtitle">${u.subtitle}</p>
    </div>
    <div class="domains">
      <div class="domain-chip">
        <div class="d-icon">🌿</div>
        <div class="d-name">${u.domainA}</div>
        <div class="d-desc">${u.domainADesc}</div>
      </div>
      <div class="domain-chip">
        <div class="d-icon">💼</div>
        <div class="d-name">${u.domainB}</div>
        <div class="d-desc">${u.domainBDesc}</div>
      </div>
    </div>
    <button class="btn" id="btnStart">${u.start}</button>
    <p class="meta-note">${u.duration}<br>${u.privacy}</p>
  </div>`;
}

function viewQuiz(){
  const u = T().ui;
  const i = state.qIndex;
  const q = T().questions[i];
  const isA = i < DOMAIN_A_COUNT;
  const pct = Math.round((i)/Q_VALUES.length*100);
  return `<div class="fade" id="quizBox">
    <div class="q-top">
      <span class="q-domain ${isA?"":"b"}">${isA?u.domainA:u.domainB}</span>
      <span class="q-count">${u.qOf(i+1,Q_VALUES.length)}</span>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="q-text">${q.t}</div>
    <div class="opts">
      ${q.o.map((opt,oi)=>`<button class="opt" data-oi="${oi}">${opt}</button>`).join("")}
    </div>
    ${i>0?`<button class="q-back" id="btnBack">${u.back}</button>`:""}
  </div>`;
}

function viewResult(){
  const u = T().ui;
  const a = avg(state.answers.slice(0,DOMAIN_A_COUNT));
  const b = avg(state.answers.slice(DOMAIN_A_COUNT));
  const overall = Math.round((a+b)/2);
  const arch = archetypeOf(overall);
  const archT = T().archetypes[arch.k];
  const la = T().levels[levelOf(a).k];
  const lb = T().levels[levelOf(b).k];
  const lo = T().levels[levelOf(overall).k];
  const gap = Math.abs(a-b);
  const gapBig = gap > 100;
  const history = loadHistory();

  return `<div class="fade">
    <div class="r-head">
      <div class="r-aura" style="background:radial-gradient(circle at 38% 32%, #FFFFFF 0%, ${arch.c2} 38%, ${arch.c1} 75%, ${arch.deep} 100%);box-shadow:0 0 60px ${arch.c1}88, var(--shadow-lg);"></div>
      <div class="r-label">${u.resultLabel}</div>
      <div class="r-archetype" style="color:${arch.deep}">${archT.name}</div>
      <div class="r-levelname">${u.levelOf}：${lo} · ${overall}</div>
    </div>
    <div class="cards">
      <div class="scores">
        <div class="card s-a">
          <div class="s-title">${u.innerBase}<br>${u.innerBaseSub}</div>
          <div class="s-value">${a}</div>
          <div class="s-level">${la}</div>
        </div>
        <div class="card s-b">
          <div class="s-title">${u.stressFreq}<br>${u.stressFreqSub}</div>
          <div class="s-value">${b}</div>
          <div class="s-level">${lb}</div>
        </div>
      </div>
      <div class="card ${gapBig?"gap-warn":"gap-ok"}">
        <h3>${u.gapTitle} · ${gap}</h3>
        <p>${gapBig?u.gapWarn:u.gapOk}</p>
      </div>
      <div class="card">
        <h3>${u.insightTitle}</h3>
        <p>${archT.insight}</p>
      </div>
      ${history.length>=2?`
      <div class="card chart-wrap">
        <h3>${u.trendTitle}</h3>
        ${trendSvg(history)}
        <div class="legend"><span class="la">${u.trendA}</span><span class="lb">${u.trendB}</span></div>
      </div>`:""}
    </div>
    <div class="r-actions">
      <button class="btn" id="btnCard">${u.share}</button>
      <button class="btn btn-ghost" id="btnRetake">${u.retake}</button>
    </div>
  </div>`;
}

function trendSvg(history){
  const data = history.slice(-6);
  const W=400,H=180,P=28;
  const ymin=0,ymax=600;
  const x=(i)=>P+(W-2*P)*(data.length===1?0.5:i/(data.length-1));
  const y=(v)=>H-P-(H-2*P)*((v-ymin)/(ymax-ymin));
  const line=(key)=>data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d[key]).toFixed(1)}`).join(" ");
  const dots=(key,color)=>data.map((d,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(d[key]).toFixed(1)}" r="3.4" fill="${color}"/>`).join("");
  const grid=[100,200,300,400,500].map(v=>`<line x1="${P}" y1="${y(v)}" x2="${W-P}" y2="${y(v)}" stroke="#F0F1F3" stroke-width="1"/><text x="${P-6}" y="${y(v)+3}" font-size="8.5" fill="#C5C9D1" text-anchor="end">${v}</text>`).join("");
  const labels=data.map((d,i)=>{const dt=new Date(d.t);return `<text x="${x(i)}" y="${H-8}" font-size="8.5" fill="#9CA3AF" text-anchor="middle">${dt.getMonth()+1}/${dt.getDate()}</text>`;}).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
    ${grid}${labels}
    <path d="${line("a")}" fill="none" stroke="#78866B" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${line("b")}" fill="none" stroke="#7B86B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots("a","#78866B")}${dots("b","#7B86B8")}
  </svg>`;
}

/* ================= events ================= */
function bindEvents(){
  const start = $("btnStart");
  if(start) start.onclick = ()=>{ state={screen:"quiz",qIndex:0,answers:[]}; render(); };
  document.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick = ()=>{
      const oi = +btn.dataset.oi;
      state.answers[state.qIndex] = Q_VALUES[state.qIndex][oi];
      const box = $("quizBox");
      if(box){ box.style.transition="opacity .25s ease-in-out"; box.style.opacity="0"; }
      setTimeout(()=>{
        if(state.qIndex < Q_VALUES.length-1){ state.qIndex++; render(); }
        else{
          const a = avg(state.answers.slice(0,DOMAIN_A_COUNT));
          const b = avg(state.answers.slice(DOMAIN_A_COUNT));
          saveHistory(a,b);
          state.screen="result"; render();
          window.scrollTo({top:0});
        }
      },250);
    };
  });
  const back = $("btnBack");
  if(back) back.onclick = ()=>{ if(state.qIndex>0){ state.qIndex--; render(); } };
  const retake = $("btnRetake");
  if(retake) retake.onclick = ()=>{ state={screen:"landing",qIndex:0,answers:[]}; render(); window.scrollTo({top:0}); };
  const cardBtn = $("btnCard");
  if(cardBtn) cardBtn.onclick = openShareCard;
}

$("lang").addEventListener("change",(e)=>{
  locale = e.target.value;
  localStorage.setItem("hawkins_lang",locale);
  render();
});

/* ================= share card (1080x1920 canvas) ================= */
let lastCardDataUrl = null;

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function openShareCard(){
  const u = T().ui;
  const a = avg(state.answers.slice(0,DOMAIN_A_COUNT));
  const b = avg(state.answers.slice(DOMAIN_A_COUNT));
  const overall = Math.round((a+b)/2);
  const arch = archetypeOf(overall);
  const archT = T().archetypes[arch.k];
  const lo = T().levels[levelOf(overall).k];
  const la = T().levels[levelOf(a).k];
  const lb = T().levels[levelOf(b).k];

  const W=1080,H=1920;
  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  const FONT='-apple-system,BlinkMacSystemFont,"PingFang TC","PingFang SC","Hiragino Sans","Yu Gothic","Microsoft JhengHei","Microsoft YaHei","Malgun Gothic",sans-serif';

  /* background gradient */
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#FDFDFC");
  g.addColorStop(.45,arch.c2);
  g.addColorStop(1,arch.c1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  /* soft aura circles */
  const circle=(cx,cy,r,color,alpha)=>{
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
    rg.addColorStop(0,color+Math.round(alpha*255).toString(16).padStart(2,"0"));
    rg.addColorStop(1,color+"00");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  };
  circle(W*0.82,H*0.12,330,"#FFFFFF",.85);
  circle(W*0.15,H*0.34,260,arch.c1,.5);
  circle(W*0.5,H*0.62,420,"#FFFFFF",.55);

  /* header */
  ctx.textAlign="center";
  ctx.fillStyle="#374151";
  ctx.font=`300 44px ${FONT}`;
  ctx.fillText(u.appTitle, W/2, 170);
  ctx.fillStyle="#9CA3AF";
  ctx.font=`300 30px ${FONT}`;
  ctx.fillText(u.cardTag, W/2, 240);

  /* main aura */
  const auraY=640, auraR=270;
  const rg=ctx.createRadialGradient(W/2-auraR*0.25,auraY-auraR*0.3,auraR*0.1,W/2,auraY,auraR);
  rg.addColorStop(0,"#FFFFFF");
  rg.addColorStop(.45,arch.c2);
  rg.addColorStop(.8,arch.c1);
  rg.addColorStop(1,arch.deep);
  ctx.save();
  ctx.shadowColor=arch.deep+"66"; ctx.shadowBlur=90;
  ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(W/2,auraY,auraR,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* archetype name */
  ctx.fillStyle="#374151";
  ctx.font=`500 88px ${FONT}`;
  ctx.fillText(archT.name, W/2, 1080);
  ctx.fillStyle=arch.deep;
  ctx.font=`400 40px ${FONT}`;
  ctx.fillText(`${u.levelOf} · ${lo}`, W/2, 1160);

  /* two-domain panel */
  ctx.save();
  ctx.fillStyle="rgba(255,255,255,.72)";
  roundedRect(ctx,110,1250,W-220,300,46); ctx.fill();
  ctx.fillStyle="#9CA3AF"; ctx.font=`300 32px ${FONT}`;
  ctx.fillText(u.innerBase, W*0.31, 1350);
  ctx.fillText(u.stressFreq, W*0.69, 1350);
  ctx.fillStyle="#78866B"; ctx.font=`500 64px ${FONT}`;
  ctx.fillText(la, W*0.31, 1450);
  ctx.fillStyle="#7B86B8";
  ctx.fillText(lb, W*0.69, 1450);
  ctx.strokeStyle="rgba(156,163,175,.35)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(W/2,1300); ctx.lineTo(W/2,1500); ctx.stroke();
  ctx.restore();

  /* date + CTA */
  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;
  ctx.fillStyle="#6B7280"; ctx.font=`300 34px ${FONT}`;
  ctx.fillText(dateStr, W/2, 1660);
  ctx.fillStyle="#374151"; ctx.font=`400 38px ${FONT}`;
  ctx.fillText(u.cardCta, W/2, 1770);
  ctx.fillStyle="#6B7280"; ctx.font=`300 30px ${FONT}`;
  ctx.fillText(location.host ? location.host+location.pathname : "energy-awareness", W/2, 1830);

  lastCardDataUrl = cv.toDataURL("image/png");
  $("cardImg").src = lastCardDataUrl;
  $("modal").classList.add("open");
}

$("btnClose").addEventListener("click",()=>$("modal").classList.remove("open"));
$("modal").addEventListener("click",(e)=>{ if(e.target.id==="modal") $("modal").classList.remove("open"); });

$("btnShare").addEventListener("click",async ()=>{
  if(!lastCardDataUrl) return;
  try{
    const blob = await (await fetch(lastCardDataUrl)).blob();
    const file = new File([blob],"energy-card.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:T().ui.appTitle});
      return;
    }
  }catch(e){ /* fall through to download */ }
  const aEl=document.createElement("a");
  aEl.href=lastCardDataUrl; aEl.download="energy-card.png";
  document.body.appendChild(aEl); aEl.click(); aEl.remove();
});

render();
</script>
</body>
</html>
