<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0B">
<meta property="og:title" content="意識能量覺察 · Energy Awareness">
<meta property="og:description" content="基於大衛・霍金斯意識能量層級的雙軌測定。定位內在基準，量化壓力耗損。">
<meta property="og:type" content="website">
<title>意識能量覺察 · Energy Awareness</title>
<style>
  :root{
    --bg:#0A0A0B;
    --surface:#1A1A1E;
    --surface-2:#202024;
    --primary:#B89947;
    --primary-dim:#8A6D2F;
    --jade:#7A8B7A;
    --border:rgba(255,255,255,0.05);
    --border-strong:rgba(255,255,255,0.1);
    --text:#E4E4E7;
    --muted:#A1A1AA;
    --glow:0 0 40px rgba(184,153,71,0.06);
    --radius:1.25rem;
    --ease:all .5s ease-in-out;
    --serif:Georgia,"Noto Serif TC","Songti TC","Songti SC","Yu Mincho",PMingLiU,SimSun,"Nanum Myeongjo","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"PingFang TC","PingFang SC","Hiragino Sans","Yu Gothic","Microsoft JhengHei","Microsoft YaHei","Malgun Gothic","Noto Sans TC","Noto Sans SC","Segoe UI",Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-weight:300;
    line-height:1.8;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  #wrap{max-width:30rem;margin:0 auto;padding:1.5rem 1.5rem 4rem;}
  header{display:flex;justify-content:space-between;align-items:center;padding:.75rem 0 2.5rem;}
  .logo{display:flex;align-items:center;gap:.6rem;font-weight:400;letter-spacing:.08em;font-size:.95rem;}
  .logo-dot{
    width:.85rem;height:.85rem;border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #E8D9A8, var(--primary) 60%, #6B5524);
    box-shadow:0 0 14px rgba(184,153,71,.5);
  }
  select#lang{
    appearance:none;-webkit-appearance:none;border:1px solid var(--border);outline:none;cursor:pointer;
    background-color:var(--surface);color:var(--muted);
    font-family:inherit;font-size:.78rem;font-weight:300;
    padding:.45rem 1.9rem .45rem 1rem;border-radius:9999px;
    background-image:url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23A1A1AA' stroke-width='1.4' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right .8rem center;
    transition:var(--ease);
  }
  .fade{animation:fadeIn .7s ease-in-out;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.88;}50%{transform:scale(1.05);opacity:1;}}

  /* ---------- landing ---------- */
  .hero{text-align:center;padding:1.2rem 0 0;}
  .aura{
    width:8.5rem;height:8.5rem;margin:0 auto 2.6rem;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #F2E7C5 0%, #D6BC76 30%, var(--primary) 62%, #4A3B16 100%);
    box-shadow:0 0 70px rgba(184,153,71,.28), 0 0 140px rgba(184,153,71,.12);
    animation:breathe 7s ease-in-out infinite;
  }
  h1{font-family:var(--serif);font-size:1.75rem;font-weight:500;letter-spacing:.1em;margin-bottom:1rem;}
  .subtitle{color:var(--muted);font-size:.9rem;font-weight:300;margin-bottom:3rem;padding:0 .25rem;}
  .domains{display:flex;gap:1rem;margin-bottom:3rem;}
  .domain-chip{
    flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:1.6rem 1rem;box-shadow:var(--glow);transition:var(--ease);text-align:center;
  }
  .domain-chip .d-mark{width:2.2rem;height:2.2rem;margin:0 auto .8rem;border-radius:50%;}
  .d-mark.a{background:radial-gradient(circle at 35% 35%, #E8D9A8, var(--primary) 70%);box-shadow:0 0 16px rgba(184,153,71,.35);}
  .d-mark.b{background:radial-gradient(circle at 35% 35%, #B9C6B9, var(--jade) 70%);box-shadow:0 0 16px rgba(122,139,122,.35);}
  .domain-chip .d-name{font-weight:400;font-size:.95rem;margin-bottom:.2rem;letter-spacing:.05em;}
  .domain-chip .d-desc{color:var(--muted);font-size:.76rem;}
  .btn{
    display:block;width:100%;border:none;cursor:pointer;
    font-family:inherit;font-size:.95rem;font-weight:400;letter-spacing:.18em;
    padding:1.1rem;border-radius:9999px;
    background:linear-gradient(135deg,#C9A954,var(--primary) 55%,#9A7E38);
    color:#121009;
    box-shadow:0 0 28px rgba(184,153,71,.22);
    transition:var(--ease);
  }
  .btn:hover{filter:brightness(1.1);transform:translateY(-2px);}
  .btn:active{transform:translateY(0);}
  .btn-ghost{
    background:var(--surface);color:var(--text);
    border:1px solid var(--border-strong);box-shadow:none;font-weight:300;
  }
  .btn-ghost:hover{border-color:rgba(184,153,71,.45);filter:none;}
  .meta-note{color:var(--muted);font-size:.76rem;text-align:center;margin-top:1.6rem;letter-spacing:.04em;}

  /* ---------- quiz ---------- */
  .q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
  .q-domain{
    font-size:.72rem;letter-spacing:.14em;color:var(--primary);
    border:1px solid rgba(184,153,71,.35);padding:.3rem 1rem;border-radius:9999px;font-weight:400;
  }
  .q-domain.b{color:#9DB39D;border-color:rgba(122,139,122,.45);}
  .q-count{color:var(--muted);font-size:.8rem;letter-spacing:.1em;}
  .progress{height:2px;background:rgba(255,255,255,.08);border-radius:9999px;overflow:hidden;margin-bottom:2.8rem;}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--primary-dim),var(--primary));transition:width .5s ease-in-out;}
  .q-text{font-family:var(--serif);font-size:1.25rem;font-weight:400;line-height:1.75;margin-bottom:2.2rem;min-height:4.4rem;}
  .opts{display:flex;flex-direction:column;gap:.9rem;}
  .opt{
    background:var(--surface);border:1px solid var(--border);cursor:pointer;text-align:left;
    font-family:inherit;font-size:.92rem;font-weight:300;color:var(--text);line-height:1.7;
    padding:1.15rem 1.4rem;border-radius:1rem;
    box-shadow:var(--glow);transition:var(--ease);
  }
  .opt:hover{border-color:rgba(184,153,71,.5);background:#1E1C16;transform:translateY(-1px);}
  .q-back{
    margin-top:2.2rem;background:none;border:none;cursor:pointer;
    color:var(--muted);font-family:inherit;font-size:.84rem;font-weight:300;letter-spacing:.05em;
    transition:var(--ease);
  }
  .q-back:hover{color:var(--text);}

  /* ---------- result ---------- */
  .r-head{text-align:center;margin-bottom:2.4rem;}
  .r-aura{
    width:9.5rem;height:9.5rem;margin:0 auto 1.8rem;border-radius:50%;
    animation:breathe 7s ease-in-out infinite;
  }
  .r-label{color:var(--muted);font-size:.74rem;letter-spacing:.32em;margin-bottom:.7rem;text-transform:uppercase;}
  .r-archetype{font-family:var(--serif);font-size:1.7rem;font-weight:500;letter-spacing:.08em;margin-bottom:.4rem;color:#EFE7CE;}
  .r-levelname{color:var(--muted);font-size:.88rem;letter-spacing:.05em;}
  .cards{display:flex;flex-direction:column;gap:1.1rem;margin-bottom:1.1rem;}
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:1.7rem;box-shadow:var(--glow);
  }
  .scores{display:flex;gap:1.1rem;}
  .scores .card{flex:1;text-align:center;padding:1.5rem .7rem;}
  .s-title{color:var(--muted);font-size:.74rem;margin-bottom:.6rem;letter-spacing:.06em;}
  .s-value{font-family:var(--serif);font-size:2.1rem;font-weight:500;line-height:1.2;}
  .s-level{font-size:.84rem;margin-top:.3rem;font-weight:400;letter-spacing:.08em;}
  .s-a .s-value,.s-a .s-level{color:var(--primary);}
  .s-b .s-value,.s-b .s-level{color:#9DB39D;}
  .card h3{font-size:.92rem;font-weight:400;margin-bottom:.8rem;letter-spacing:.1em;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
  .card p{font-size:.87rem;color:var(--muted);font-weight:300;}
  .tag{
    font-size:.66rem;letter-spacing:.12em;padding:.12rem .6rem;border-radius:9999px;font-weight:400;
  }
  .tag-loss{color:#D4A24E;border:1px solid rgba(212,162,78,.5);}
  .tag-ok{color:#9DB39D;border:1px solid rgba(122,139,122,.5);}
  .tag-pro{color:var(--primary);border:1px solid rgba(184,153,71,.5);}
  .gap-warn{border-left:2px solid var(--primary-dim);}
  .gap-ok{border-left:2px solid var(--jade);}
  .seg{display:flex;gap:.4rem;margin-left:auto;}
  .seg button{
    background:none;border:1px solid var(--border-strong);color:var(--muted);cursor:pointer;
    font-family:inherit;font-size:.68rem;letter-spacing:.08em;font-weight:300;
    padding:.18rem .7rem;border-radius:9999px;transition:var(--ease);
  }
  .seg button.on{color:var(--primary);border-color:rgba(184,153,71,.55);}
  .legend{display:flex;gap:1.4rem;margin-top:.8rem;font-size:.72rem;color:var(--muted);}
  .legend span::before{content:"";display:inline-block;width:.85rem;height:2px;border-radius:2px;margin-right:.4rem;vertical-align:middle;}
  .legend .la::before{background:var(--primary);}
  .legend .lb::before{background:var(--jade);}
  .locked{
    text-align:center;padding:2.2rem 1.5rem;
    border:1px dashed var(--border-strong);
  }
  .locked p{margin-bottom:1.2rem;}
  .locked .btn{max-width:14rem;margin:0 auto;padding:.8rem;font-size:.84rem;}
  .reminder-row{display:flex;gap:.7rem;margin-top:1.1rem;}
  .reminder-row select,.reminder-row input{
    flex:1;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);
    font-family:inherit;font-size:.85rem;font-weight:300;
    padding:.6rem .8rem;border-radius:.7rem;outline:none;transition:var(--ease);
    color-scheme:dark;
  }
  .reminder-row select:focus,.reminder-row input:focus{border-color:rgba(184,153,71,.5);}
  .card .btn{margin-top:1.2rem;padding:.85rem;font-size:.86rem;}
  .r-actions{display:flex;flex-direction:column;gap:.9rem;margin-top:2.1rem;}
  .text-link{
    display:block;text-align:center;margin-top:1.4rem;background:none;border:none;cursor:pointer;
    color:var(--muted);font-family:inherit;font-size:.76rem;font-weight:300;
    text-decoration:underline;text-underline-offset:3px;text-decoration-color:rgba(161,161,170,.4);
    transition:var(--ease);
  }
  .text-link:hover{color:var(--text);}
  .consult{
    background:linear-gradient(160deg,#1C1A14,#1A1A1E 70%);
    border:1px solid rgba(184,153,71,.25);
  }
  .consult h3{color:#EFE7CE;font-family:var(--serif);letter-spacing:.12em;font-size:1rem;}
  .consult .btn{display:inline-block;width:auto;padding:.7rem 1.8rem;text-decoration:none;text-align:center;}

  /* ---------- modals ---------- */
  .overlay{
    position:fixed;inset:0;display:none;z-index:50;
    background:rgba(5,5,6,.72);backdrop-filter:blur(8px);
    align-items:center;justify-content:center;padding:1.5rem;
  }
  .overlay.open{display:flex;}
  .modal-box{
    background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--radius);
    padding:1.6rem;max-width:22rem;width:100%;
    box-shadow:0 0 60px rgba(0,0,0,.6);text-align:center;
    max-height:92vh;overflow-y:auto;
  }
  .modal-box img{width:100%;border-radius:.9rem;border:1px solid var(--border);}
  .modal-hint{color:var(--muted);font-size:.78rem;margin:.9rem 0 1.1rem;}
  .modal-actions{display:flex;gap:.8rem;}
  .modal-actions .btn{padding:.85rem;font-size:.86rem;}

  /* paywall */
  .pw-title{font-family:var(--serif);font-size:1.3rem;letter-spacing:.1em;margin-bottom:.5rem;color:#EFE7CE;}
  .pw-sub{color:var(--muted);font-size:.82rem;margin-bottom:1.4rem;}
  .pw-feats{text-align:left;margin:0 0 1.5rem;list-style:none;}
  .pw-feats li{
    font-size:.82rem;color:var(--text);font-weight:300;padding:.45rem 0 .45rem 1.4rem;position:relative;
    border-bottom:1px solid var(--border);
  }
  .pw-feats li:last-child{border-bottom:none;}
  .pw-feats li::before{content:"◆";position:absolute;left:.1rem;color:var(--primary);font-size:.6rem;top:.62rem;}
  .cur-tabs{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.1rem;}
  .cur-tabs button{
    background:none;border:1px solid var(--border-strong);color:var(--muted);cursor:pointer;
    font-family:inherit;font-size:.74rem;letter-spacing:.1em;padding:.3rem 1rem;border-radius:9999px;transition:var(--ease);
  }
  .cur-tabs button.on{color:var(--primary);border-color:rgba(184,153,71,.55);}
  .pw-price{font-family:var(--serif);font-size:1.6rem;color:#EFE7CE;margin-bottom:.2rem;}
  .pw-price span{font-size:.8rem;color:var(--muted);font-family:var(--sans);}
  .pw-year{color:var(--muted);font-size:.78rem;margin-bottom:1.3rem;}
  .pw-methods{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.3rem;}
  .pw-method{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--surface-2);border:1px solid var(--border);border-radius:.7rem;
    padding:.65rem 1rem;font-size:.82rem;color:var(--muted);
  }
  .pw-method em{font-style:normal;font-size:.64rem;letter-spacing:.1em;color:var(--primary-dim);}
  .pw-note{color:var(--muted);font-size:.74rem;margin-bottom:1rem;}
  .seed-row{display:flex;gap:.6rem;}
  .seed-row input{
    flex:1;background:var(--surface-2);border:1px solid var(--border-strong);color:var(--text);
    font-family:inherit;font-size:.85rem;letter-spacing:.15em;text-align:center;
    padding:.7rem;border-radius:9999px;outline:none;transition:var(--ease);
  }
  .seed-row input:focus{border-color:rgba(184,153,71,.5);}
  .seed-row .btn{width:auto;padding:.7rem 1.4rem;font-size:.82rem;}
  .seed-err{color:#C4836B;font-size:.74rem;margin-top:.7rem;min-height:1.1rem;}

  #toast{
    position:fixed;left:50%;bottom:2rem;transform:translateX(-50%) translateY(160%);z-index:60;
    background:var(--surface);border:1px solid rgba(184,153,71,.45);color:var(--text);
    font-size:.82rem;letter-spacing:.05em;padding:.8rem 1.6rem;border-radius:9999px;
    box-shadow:0 0 40px rgba(0,0,0,.5);transition:transform .5s ease-in-out;white-space:nowrap;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  footer{
    text-align:center;color:#5B5B62;font-size:.7rem;font-weight:300;
    margin-top:3.5rem;letter-spacing:.06em;
  }

  /* ---------- A4 report (print only) ---------- */
  #reportRoot{display:none;}
  @media print{
    @page{size:A4;margin:14mm;}
    body{background:#fff;}
    #wrap,#modal,#paywall,#toast{display:none !important;}
    #reportRoot{display:block !important;}
  }
  #reportRoot{
    font-family:var(--serif);color:#26241E;background:#fff;line-height:1.75;
  }
  .rp-head{border-bottom:2px solid #8A6D2F;padding-bottom:4mm;margin-bottom:7mm;display:flex;justify-content:space-between;align-items:flex-end;}
  .rp-brand{font-size:13pt;letter-spacing:.2em;color:#26241E;}
  .rp-doc{font-size:9pt;color:#8A6D2F;letter-spacing:.18em;margin-top:1mm;}
  .rp-date{font-size:9pt;color:#7A766B;}
  .rp-sec{margin-bottom:6.5mm;}
  .rp-sec h2{
    font-size:10.5pt;letter-spacing:.22em;color:#8A6D2F;font-weight:600;
    margin-bottom:2.5mm;border-left:3px solid #8A6D2F;padding-left:3mm;
  }
  .rp-sec p{font-size:10pt;color:#3A372F;}
  .rp-grid{display:flex;gap:5mm;}
  .rp-cell{flex:1;border:1px solid #DDD8C8;border-radius:2.5mm;padding:4mm;text-align:center;}
  .rp-cell .l{font-size:8.5pt;color:#7A766B;letter-spacing:.1em;}
  .rp-cell .v{font-size:18pt;color:#26241E;margin:1mm 0;}
  .rp-cell .n{font-size:9.5pt;color:#8A6D2F;letter-spacing:.12em;}
  .rp-tagline{display:inline-block;font-size:8.5pt;letter-spacing:.15em;border:1px solid #8A6D2F;color:#8A6D2F;border-radius:9999px;padding:.5mm 4mm;margin-bottom:2mm;}
  .rp-actions{list-style:none;counter-reset:act;}
  .rp-actions li{
    font-size:10pt;color:#3A372F;padding:1.8mm 0 1.8mm 9mm;position:relative;counter-increment:act;
    border-bottom:1px dashed #DDD8C8;
  }
  .rp-actions li::before{
    content:counter(act,decimal-leading-zero);position:absolute;left:0;color:#8A6D2F;font-size:9pt;letter-spacing:.05em;
  }
  .rp-notes{
    border:1.5px dashed #B8B19C;border-radius:3mm;height:62mm;padding:4mm;
  }
  .rp-notes .hint{font-size:8.5pt;color:#A39E8D;font-style:italic;}
  .rp-consult{background:#F7F4EA;border-radius:3mm;padding:5mm;}
  .rp-consult .t{font-size:10.5pt;color:#26241E;letter-spacing:.12em;margin-bottom:1mm;}
  .rp-consult p{font-size:9pt;color:#5A564A;}
  .rp-consult .mail{font-size:9pt;color:#8A6D2F;letter-spacing:.04em;}
  .rp-foot{margin-top:7mm;border-top:1px solid #DDD8C8;padding-top:3mm;font-size:8pt;color:#A39E8D;}
</style>
</head>
<body>
<div id="wrap">
  <header>
    <div class="logo"><div class="logo-dot"></div><span id="logoText"></span></div>
    <select id="lang">
      <option value="zh-TW">繁體中文</option>
      <option value="zh-CN">简体中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </header>
  <main id="main"></main>
  <footer id="foot"></footer>
</div>

<!-- share card modal -->
<div id="modal" class="overlay">
  <div class="modal-box">
    <img id="cardImg" alt="energy card">
    <div class="modal-hint" id="modalHint"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnClose"></button>
      <button class="btn" id="btnShare"></button>
    </div>
  </div>
</div>

<!-- paywall modal -->
<div id="paywall" class="overlay">
  <div class="modal-box" style="text-align:center">
    <div class="pw-title" id="pwTitle"></div>
    <div class="pw-sub" id="pwSub"></div>
    <ul class="pw-feats" id="pwFeats"></ul>
    <div class="cur-tabs" id="curTabs">
      <button data-cur="TWD">TWD</button>
      <button data-cur="USD">USD</button>
      <button data-cur="CNY">CNY</button>
    </div>
    <div class="pw-price" id="pwPrice"></div>
    <div class="pw-year" id="pwYear"></div>
    <div class="pw-methods" id="pwMethods"></div>
    <div class="pw-note" id="pwNote"></div>
    <div class="seed-row">
      <input id="seedInput" autocomplete="off" spellcheck="false">
      <button class="btn" id="btnSeed"></button>
    </div>
    <div class="seed-err" id="seedErr"></div>
    <button class="text-link" id="pwClose" style="margin-top:.6rem"></button>
  </div>
</div>

<div id="toast"></div>
<div id="reportRoot"></div>

<script>
/* ================= constants ================= */
/* 30-question bank: 15 per domain; each test draws 5+5 at random */
const BANK_V = {
  a: [
    [50,100,250,540],[150,100,200,350],[30,50,350,500],[75,125,310,500],[100,250,310,540],
    [100,50,250,310],[30,100,350,500],[20,125,350,500],[100,150,400,250],[50,100,540,310],
    [30,75,350,500],[100,150,400,500],[75,150,250,500],[100,125,250,500],[30,125,350,540]
  ],
  b: [
    [100,150,310,400],[75,175,400,350],[100,175,310,500],[50,150,400,540],[100,50,200,310],
    [100,150,400,350],[75,150,310,350],[100,150,200,310],[100,50,400,310],[50,75,310,540],
    [100,150,250,350],[75,175,310,400],[20,175,400,500],[100,150,400,350],[100,175,200,540]
  ]
};
const DOMAIN_A_COUNT = 5;
const TOTAL_Q = 10;

const LEVELS = [
  {v:540,k:"joy"},{v:500,k:"love"},{v:400,k:"reason"},{v:350,k:"acceptance"},
  {v:310,k:"willingness"},{v:250,k:"neutrality"},{v:200,k:"courage"},
  {v:175,k:"pride"},{v:150,k:"anger"},{v:125,k:"desire"},{v:100,k:"fear"},
  {v:75,k:"grief"},{v:50,k:"apathy"},{v:30,k:"guilt"},{v:20,k:"shame"}
];

/* ================= state ================= */
let locale = detectLocale();
let state = { screen:"landing", qIndex:0, answers:[] };
let trendMode = "both";
let payCur = "TWD";
const $ = (id)=>document.getElementById(id);
const T = ()=>I18N[locale];

function detectLocale(){
  const saved = localStorage.getItem("hawkins_lang");
  if(saved && I18N[saved]) return saved;
  const nav = (navigator.language||"en").toLowerCase();
  if(nav.startsWith("zh")){
    if(nav.includes("tw")||nav.includes("hant")||nav.includes("hk")||nav.includes("mo")) return "zh-TW";
    return "zh-CN";
  }
  if(nav.startsWith("ja")) return "ja";
  if(nav.startsWith("ko")) return "ko";
  return "en";
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function drawSet(poolSize, avoid){
  const pool = [];
  for(let i=0;i<poolSize;i++) pool.push(i);
  let cand = pool.filter(i=>!(avoid||[]).includes(i));
  if(cand.length < DOMAIN_A_COUNT) cand = pool;
  return shuffle(cand).slice(0, DOMAIN_A_COUNT);
}
function startQuiz(){
  let last = {a:[],b:[]};
  try{ last = JSON.parse(localStorage.getItem("hawkins_last_q")||'{"a":[],"b":[]}'); }catch(e){}
  const quiz = {
    a: drawSet(BANK_V.a.length, last.a),
    b: drawSet(BANK_V.b.length, last.b),
    perm: Array.from({length:TOTAL_Q},()=>shuffle([0,1,2,3]))
  };
  state = { screen:"quiz", qIndex:0, answers:[], quiz:quiz };
  render();
}
function quizQuestion(i){
  const isA = i < DOMAIN_A_COUNT;
  const bankIdx = isA ? state.quiz.a[i] : state.quiz.b[i-DOMAIN_A_COUNT];
  return {
    isA: isA,
    q: (isA ? T().qa : T().qb)[bankIdx],
    v: (isA ? BANK_V.a : BANK_V.b)[bankIdx],
    perm: state.quiz.perm[i]
  };
}
function levelOf(score){ for(const l of LEVELS){ if(score>=l.v) return l; } return LEVELS[LEVELS.length-1]; }
function archetypeOf(score){ for(const a of ARCHETYPES){ if(score>=a.min) return a; } return ARCHETYPES[ARCHETYPES.length-1]; }
function avg(arr){ return Math.round(arr.reduce((s,x)=>s+x,0)/arr.length); }

function loadHistory(){ try{ return JSON.parse(localStorage.getItem("hawkins_history")||"[]"); }catch(e){ return []; } }
function saveHistory(a,b){
  const h = loadHistory();
  h.push({t:Date.now(),a,b,seed:localStorage.getItem("hawkins_seed")||null});
  while(h.length>24) h.shift();
  localStorage.setItem("hawkins_history",JSON.stringify(h));
}

/* ================= pro / seed (RBAC) ================= */
function isPro(){ return localStorage.getItem("hawkins_pro")==="1"; }
function unlockPro(code){
  localStorage.setItem("hawkins_pro","1");
  if(code) localStorage.setItem("hawkins_seed",code);
}
function tryCode(raw){
  const code = (raw||"").trim().toUpperCase();
  if(SEED_CODES.includes(code)){ unlockPro(code); return true; }
  return false;
}
(function checkSeedParam(){
  try{
    const p = new URLSearchParams(location.search).get("seed");
    if(p && tryCode(p)){
      setTimeout(()=>toast(T().ui.seedOk),600);
    }
  }catch(e){}
})();

function toast(msg){
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),3200);
}

function currentResult(){
  const a = avg(state.answers.slice(0,DOMAIN_A_COUNT));
  const b = avg(state.answers.slice(DOMAIN_A_COUNT));
  const overall = Math.round((a+b)/2);
  return { a, b, overall, gap:Math.abs(a-b), arch:archetypeOf(overall) };
}

  } else if(history.length<2){
    trendSection = `<div class="card">
      <h3>${u.trendTitle} <span class="tag tag-pro">PRO</span></h3>
      <p>${u.trendLocked}</p>
    </div>`;
  } else {
    trendSection = `<div class="card">
      <h3>${u.trendTitle}
        <div class="seg">
          <button data-tm="both" class="${trendMode==='both'?'on':''}">${u.trendBoth}</button>
          <button data-tm="a" class="${trendMode==='a'?'on':''}">${u.trendA}</button>
          <button data-tm="b" class="${trendMode==='b'?'on':''}">${u.trendB}</button>
        </div>
      </h3>
      <div id="trendBox">${trendSvg(history,trendMode,"dark")}</div>
      <div class="legend"><span class="la">${u.trendA}</span><span class="lb">${u.trendB}</span></div>
    </div>`;
  }

  const wdOpts = u.weekdays.map((w,i)=>`<option value="${i}" ${i===1?"selected":""}>${w}</option>`).join("");

  return `<div class="fade">
    <div class="r-head">
      <div class="r-aura" style="background:radial-gradient(circle at 38% 32%, #FFFFFF 0%, ${r.arch.c2} 34%, ${r.arch.c1} 72%, ${r.arch.deep} 100%);box-shadow:0 0 70px ${r.arch.c1}55, 0 0 140px ${r.arch.c1}22;"></div>
      <div class="r-label">${u.resultLabel}</div>
      <div class="r-archetype">${archT.name}</div>
      <div class="r-levelname">${u.levelOf} · ${lo} · ${r.overall}</div>
    </div>
    <div class="cards">
      <div class="scores">
        <div class="card s-a">
          <div class="s-title">${u.innerBase}<br>${u.innerBaseSub}</div>
          <div class="s-value">${r.a}</div>
          <div class="s-level">${la}</div>
        </div>
        <div class="card s-b">
          <div class="s-title">${u.stressFreq}<br>${u.stressFreqSub}</div>
          <div class="s-value">${r.b}</div>
          <div class="s-level">${lb}</div>
        </div>
      </div>
      <div class="card ${gapBig?"gap-warn":"gap-ok"}">
        <h3>${u.gapTitle} · ${r.gap} <span class="tag ${gapBig?"tag-loss":"tag-ok"}">${gapBig?u.lossTag:u.stableTag}</span></h3>
        <p>${gapBig?u.gapWarn:u.gapOk}</p>
      </div>
      <div class="card">
        <h3>${u.insightTitle}</h3>
        <p>${archT.insight}</p>
      </div>
      ${trendSection}
      <div class="card">
        <h3>${u.reminderTitle} <span class="tag tag-pro">PRO</span></h3>
        <p>${u.reminderDesc}</p>
        <div class="reminder-row">
          <select id="remDay">${wdOpts}</select>
          <input type="time" id="remTime" value="08:00">
        </div>
        <button class="btn btn-ghost" id="btnIcs">${u.addToCalendar}</button>
      </div>
      <div class="card consult">
        <h3>${u.consultTitle}</h3>
        <p style="margin-bottom:1.2rem">${u.consultDesc}</p>
        <a class="btn" href="${mailHref}">${u.consultCta}</a>
      </div>
    </div>
    <div class="r-actions">
      <button class="btn" id="btnCard">${u.share}</button>
      <button class="btn btn-ghost" id="btnPdf">${u.exportPdf}</button>
      <button class="btn btn-ghost" id="btnRetake">${u.retake}</button>
    </div>
    <button class="text-link" id="btnExport">${u.exportData}</button>
  </div>`;
}

function trendSvg(history,mode,theme){
  const data = history.slice(-6);
  const W=400,H=180,P=28;
  const dark = theme!=="print";
  const cA = dark?"#B89947":"#8A6D2F";
  const cB = dark?"#7A8B7A":"#4F5F4F";
  const cGrid = dark?"rgba(255,255,255,.06)":"#E4DFD0";
  const cLabel = dark?"#6B6B72":"#A39E8D";
  const ymin=0,ymax=600;
  const x=(i)=>P+(W-2*P)*(data.length===1?0.5:i/(data.length-1));
  const y=(v)=>H-P-(H-2*P)*((v-ymin)/(ymax-ymin));
  const line=(key)=>data.map((d,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(d[key]).toFixed(1)}`).join(" ");
  const dots=(key,color)=>data.map((d,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(d[key]).toFixed(1)}" r="3.2" fill="${color}"/>`).join("");
  const grid=[100,200,300,400,500].map(v=>`<line x1="${P}" y1="${y(v)}" x2="${W-P}" y2="${y(v)}" stroke="${cGrid}" stroke-width="1"/><text x="${P-6}" y="${y(v)+3}" font-size="8.5" fill="${cLabel}" text-anchor="end">${v}</text>`).join("");
  const labels=data.map((d,i)=>{const dt=new Date(d.t);return `<text x="${x(i)}" y="${H-8}" font-size="8.5" fill="${cLabel}" text-anchor="middle">${dt.getMonth()+1}/${dt.getDate()}</text>`;}).join("");
  const showA = mode!=="b", showB = mode!=="a";
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">
    ${grid}${labels}
    ${showA?`<path d="${line("a")}" fill="none" stroke="${cA}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots("a",cA)}`:""}
    ${showB?`<path d="${line("b")}" fill="none" stroke="${cB}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots("b",cB)}`:""}
  </svg>`;
}

/* ================= events ================= */
function bindEvents(){
  const start = $("btnStart");
  if(start) start.onclick = startQuiz;
  document.querySelectorAll(".opt").forEach(btn=>{
    btn.onclick = ()=>{
      if(state.lock) return; /* ignore double-taps during the fade transition */
      state.lock = true;
      const oi = +btn.dataset.oi;
      state.answers[state.qIndex] = quizQuestion(state.qIndex).v[oi];
      const box = $("quizBox");
      if(box){ box.style.transition="opacity .25s ease-in-out"; box.style.opacity="0"; }
      setTimeout(()=>{
        state.lock = false;
        if(state.qIndex < TOTAL_Q-1){ state.qIndex++; render(); }
        else{
          const a = avg(state.answers.slice(0,DOMAIN_A_COUNT));
          const b = avg(state.answers.slice(DOMAIN_A_COUNT));
          saveHistory(a,b);
          localStorage.setItem("hawkins_last_q", JSON.stringify({a:state.quiz.a, b:state.quiz.b}));
          state.screen="result"; render();
          window.scrollTo({top:0});
        }
      },250);
    };
  });
  const back = $("btnBack");
  if(back) back.onclick = ()=>{ if(!state.lock && state.qIndex>0){ state.qIndex--; render(); } };
  const retake = $("btnRetake");
  if(retake) retake.onclick = ()=>{ state={screen:"landing",qIndex:0,answers:[]}; render(); window.scrollTo({top:0}); };
  const cardBtn = $("btnCard");
  if(cardBtn) cardBtn.onclick = openShareCard;
  const pdfBtn = $("btnPdf");
  if(pdfBtn) pdfBtn.onclick = ()=>{ requirePro(exportReport); };
  const lockTrend = $("lockTrend");
  if(lockTrend) lockTrend.onclick = openPaywall;
  const icsBtn = $("btnIcs");
  if(icsBtn) icsBtn.onclick = ()=>{ requirePro(downloadIcs); };
  const expBtn = $("btnExport");
  if(expBtn) expBtn.onclick = exportData;
  document.querySelectorAll(".seg button").forEach(b=>{
    b.onclick = ()=>{ trendMode = b.dataset.tm; const box=$("trendBox"); if(box) box.innerHTML = trendSvg(loadHistory(),trendMode,"dark");
      document.querySelectorAll(".seg button").forEach(x=>x.classList.toggle("on",x===b)); };
  });
}

/* ================= ICS weekly anchor ================= */
function downloadIcs(){
  const u = T().ui;
  const day = +($("remDay").value||1);
  const time = ($("remTime").value||"08:00");
  const [hh,mm] = time.split(":").map(Number);
  const now = new Date();
  const next = new Date(now);
  next.setDate(now.getDate() + ((day - now.getDay() + 7) % 7 || 7));
  next.setHours(hh,mm,0,0);
  const p2 = (n)=>String(n).padStart(2,"0");
  const dt = `${next.getFullYear()}${p2(next.getMonth()+1)}${p2(next.getDate())}T${p2(hh)}${p2(mm)}00`;
  const byday = ["SU","MO","TU","WE","TH","FR","SA"][day];
  const stamp = `${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}T${p2(now.getHours())}${p2(now.getMinutes())}00`;
  const ics = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//EnergyAwareness//Anchor//EN",
    "BEGIN:VEVENT",
    `UID:anchor-${day}-${time.replace(":","")}@energy-awareness`,
    `DTSTAMP:${stamp}`,
    `DTSTART:${dt}`,
    `RRULE:FREQ=WEEKLY;BYDAY=${byday}`,
    `SUMMARY:${u.reminderEvent}`,
    `DESCRIPTION:${location.origin}${location.pathname}`,
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  const blob = new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "energy-anchor.ics";
  document.body.appendChild(a); a.click(); a.remove();
  toast(u.seedOk.split("。")[0] || "OK");
}

/* ================= data export ================= */
function exportData(){
  const payload = {
    exported: new Date().toISOString(),
    seed: localStorage.getItem("hawkins_seed")||null,
    lang: locale,
    history: loadHistory()
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "energy-data.json";
  document.body.appendChild(a); a.click(); a.remove();
}

      <h2>02 · ${u.rSec2}</h2>

      <p>${gapBig?u.gapWarn:u.gapOk}</p>

    <div class="rp-sec">
      <h2>03 · ${u.rSec3}</h2>

  `;

  setTimeout(()=>window.print(),350);
}

/* ================= share card (1080x1920 canvas, dark) ================= */
let lastCardDataUrl = null;

function roundedRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function openShareCard(){
  const u = T().ui;
  const r = currentResult();
  const archT = T().archetypes[r.arch.k];
  const lo = T().levels[levelOf(r.overall).k];
  const la = T().levels[levelOf(r.a).k];
  const lb = T().levels[levelOf(r.b).k];

  const W=1080,H=1920;
  const cv=document.createElement("canvas");
  cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  const SANS='-apple-system,BlinkMacSystemFont,"PingFang TC","PingFang SC","Hiragino Sans","Yu Gothic","Microsoft JhengHei","Microsoft YaHei","Malgun Gothic",sans-serif';
  const SERIF='Georgia,"Noto Serif TC","Songti TC","Songti SC","Yu Mincho",PMingLiU,SimSun,serif';

  /* obsidian background */
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0C0C0E");
  g.addColorStop(.55,"#0A0A0B");
  g.addColorStop(1,"#101012");
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  /* aura glow circles */
  const circle=(cx,cy,rad,color,alpha)=>{
    const rg=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
    rg.addColorStop(0,color+Math.round(alpha*255).toString(16).padStart(2,"0"));
    rg.addColorStop(1,color+"00");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
  };
  circle(W*0.5,640,560,r.arch.c1,.22);
  circle(W*0.85,H*0.1,300,"#B89947",.10);
  circle(W*0.12,H*0.8,320,r.arch.c1,.10);

  /* header */
  ctx.textAlign="center";
  ctx.fillStyle="#E4E4E7";
  ctx.font=`300 44px ${SANS}`;
  ctx.fillText(u.appTitle, W/2, 170);
  ctx.fillStyle="#B89947";
  ctx.font=`400 30px ${SANS}`;
  ctx.fillText(u.cardTag, W/2, 242);

  /* main aura */
  const auraY=640, auraR=265;
  const rg=ctx.createRadialGradient(W/2-auraR*0.25,auraY-auraR*0.3,auraR*0.1,W/2,auraY,auraR);
  rg.addColorStop(0,"#FFFFFF");
  rg.addColorStop(.4,r.arch.c2);
  rg.addColorStop(.78,r.arch.c1);
  rg.addColorStop(1,r.arch.deep);
  ctx.save();
  ctx.shadowColor=r.arch.c1+"AA"; ctx.shadowBlur=110;
  ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(W/2,auraY,auraR,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* archetype name */
  ctx.fillStyle="#F0EDE4";
  ctx.font=`500 92px ${SERIF}`;
  ctx.fillText(archT.name, W/2, 1085);
  ctx.fillStyle="#B89947";
  ctx.font=`400 40px ${SANS}`;
  ctx.fillText(`${u.levelOf} · ${lo}`, W/2, 1165);

  /* two-domain panel */
  ctx.save();
  ctx.fillStyle="rgba(255,255,255,.05)";
  roundedRect(ctx,110,1255,W-220,300,46); ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,.09)"; ctx.lineWidth=2;
  roundedRect(ctx,110,1255,W-220,300,46); ctx.stroke();
  ctx.fillStyle="#A1A1AA"; ctx.font=`300 32px ${SANS}`;
  ctx.fillText(u.innerBase, W*0.31, 1355);
  ctx.fillText(u.stressFreq, W*0.69, 1355);
  ctx.fillStyle="#B89947"; ctx.font=`500 64px ${SERIF}`;
  ctx.fillText(la, W*0.31, 1458);
  ctx.fillStyle="#9DB39D";
  ctx.fillText(lb, W*0.69, 1458);
  ctx.strokeStyle="rgba(255,255,255,.12)";
  ctx.beginPath(); ctx.moveTo(W/2,1305); ctx.lineTo(W/2,1505); ctx.stroke();
  ctx.restore();

  /* date + CTA */
  const now=new Date();
  const dateStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,"0")}.${String(now.getDate()).padStart(2,"0")}`;
  ctx.fillStyle="#71717A"; ctx.font=`300 34px ${SANS}`;
  ctx.fillText(dateStr, W/2, 1660);
  ctx.fillStyle="#E4E4E7"; ctx.font=`400 38px ${SANS}`;
  ctx.fillText(u.cardCta, W/2, 1768);
  ctx.fillStyle="#B89947"; ctx.font=`300 30px ${SANS}`;
  ctx.fillText(location.host ? location.host+location.pathname : "energy-awareness", W/2, 1830);

  lastCardDataUrl = cv.toDataURL("image/png");
  $("cardImg").src = lastCardDataUrl;
  $("modal").classList.add("open");
}

$("btnClose").addEventListener("click",()=>$("modal").classList.remove("open"));
$("modal").addEventListener("click",(e)=>{ if(e.target.id==="modal") $("modal").classList.remove("open"); });

$("btnShare").addEventListener("click",async ()=>{
  if(!lastCardDataUrl) return;
  try{
    const blob = await (await fetch(lastCardDataUrl)).blob();
    const file = new File([blob],"energy-card.png",{type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:T().ui.appTitle});
      return;
    }
  }catch(e){ /* fall through to download */ }
  const aEl=document.createElement("a");
  aEl.href=lastCardDataUrl; aEl.download="energy-card.png";
  document.body.appendChild(aEl); aEl.click(); aEl.remove();
});

render();
</script>
